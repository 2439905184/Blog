如果产生了一定程度的上头成瘾，精神享乐主义现象。

笔者，对于上海爱丽丝幻乐团的理解，那个幻字类作品音乐听太多容易导致人出现幻想以及精神恍惚的状态。

东方永夜抄专辑的某些曲子可能会导致敏感性人格（水象星座）的一些负面精神作用。
东方永夜抄主题以阴暗性能量为主，建议敏感性人格少听。
笔者指出下列曲子
《永夜抄　～ Eastern Night.》神秘。
《幻視の夜　～ Ghostly Eyes》阴性能量。
《夜雀の歌声　～ Night Bird》导致大脑亢奋。
《プレインエイジア》阴性能量。
《月まで届け、不死の煙》会导致敏感性人格一定程度的大脑精神亢奋负面作用（小号）。
《U.N.オーエンは彼女なのか？》此曲同理。
《竹取飛翔　～ Lunatic Princess》同理。

听音乐属于某种精神享乐，听多了会导致一些精神负面效果，要少听。

zun式小号对于某些特殊人会有特殊吸引性，但是听多了会导致大脑精神亢奋。
zun式幻想作品，在同人作品里面，会出现某种人物变换的效果，变来变去，文化视听过渡会导致人的精神和肉体出问题。
总结，游戏类亢奋，bpm速度过高的音乐少听。
