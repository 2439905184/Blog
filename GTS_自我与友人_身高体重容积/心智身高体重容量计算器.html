<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>心智巨大化计算器</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 0 20px; background: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        label { display: block; margin-top: 10px; }
        input[type=number] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 20px; padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
        .result { margin-top: 20px; padding: 15px; background: #e3f2fd; border-radius: 4px; }
        .result p { margin: 5px 0; font-weight: bold; }
        .note { font-size: 0.9em; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>心智巨大化计算器</h2>
        <p>心智身高 = 基础身高 × 心智年龄系数 × 内在世界丰富度 × 整合深度 × 创造驱动力**</p>
        <p>心智体重 = 体积 × 密度</p>
        <p>心智体积 = 心智身高 / 基础身高 ≈ 倍数，体积倍数 =倍数³ 体积 = 0.07（心智体积基准） × 体积倍数 =x 立方米</p>
        <p>心智容积 = 普通人内心半径 10 米，身高倍数 9,059，容量系数取 3.5 → 等效半径 = 10 × 9,059 × 3.5 ≈ 317,065 米 = 317 公里</p>
</body>
</html>
